<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n.Call — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Login-specific styles only */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container { width: 100%; max-width: 420px; }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-logo {
            width: 56px; height: 56px; background: var(--primary);
            border-radius: var(--radius-md); display: inline-flex; align-items: center;
            justify-content: center; margin-bottom: 16px;
        }
        .login-logo span { color: white; font-weight: 700; font-size: 28px; }
        .login-brand h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .login-brand h1 em { font-weight: 300; font-style: normal; color: var(--text-secondary); }
        .login-brand p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .login-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 32px;
        }
        .login-card h2 {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 24px;
            display: flex; align-items: center; gap: 8px;
        }
        .login-card h2 .material-symbols-outlined { font-size: 22px; color: var(--primary); }
        .form-input-wrap { position: relative; }
        .form-input-wrap > .material-symbols-outlined:first-child {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            font-size: 18px; color: var(--text-secondary); pointer-events: none;
        }
        .login-card .form-input { padding-left: 40px; }
        .form-input.error {
            border-color: var(--emergency);
            box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
        }
        .toggle-pw {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: var(--text-secondary);
            padding: 2px; display: flex;
        }
        .toggle-pw:hover { color: var(--primary); }
        input::-ms-reveal, input::-ms-clear { display: none; }
        input::-webkit-credentials-auto-fill-button { display: none; }
        .error-msg {
            display: none; align-items: center; gap: 6px;
            font-size: 12px; color: var(--emergency); margin-top: 12px;
            padding: 8px 12px; background: var(--emergency-bg); border-radius: var(--radius-sm);
        }
        .error-msg.visible { display: flex; }
        .error-msg .material-symbols-outlined { font-size: 16px; }
        .btn-login {
            width: 100%; font-family: var(--font-family); font-size: 14px;
            font-weight: 600; padding: 12px; border: none;
            border-radius: var(--radius-sm); background: var(--primary);
            color: white; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 24px;
        }
        .btn-login:hover { background: var(--primary-dark); box-shadow: var(--shadow-md); }
        .btn-login:active { transform: scale(0.98); }
        .btn-login .material-symbols-outlined { font-size: 18px; }
        .login-footer {
            text-align: center; margin-top: 24px;
            font-size: 11px; color: var(--text-secondary);
        }
        .shake { animation: shake 0.4s; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <div class="login-logo"><span>n</span></div>
            <h1>n<em>.Call</em></h1>
            <p>Chama a Enfermagem</p>
        </div>

        <div class="login-card" id="login-card">
            <h2>
                <span class="material-symbols-outlined">lock</span>
                Acesso ao Sistema
            </h2>

            <form onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Usuário</label>
                    <div class="form-input-wrap">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" class="form-input" id="username" placeholder="Digite seu usuário" autocomplete="off" autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <div class="form-input-wrap">
                        <input type="password" class="form-input" id="password" placeholder="Digite sua senha" style="padding-left:14px; padding-right:42px;">
                        <button type="button" class="toggle-pw" onclick="togglePw()">
                            <span class="material-symbols-outlined" id="pw-icon" style="font-size:18px;">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="error-msg" id="error-msg">
                    <span class="material-symbols-outlined">error</span>
                    Usuário ou senha incorretos.
                </div>

                <button type="submit" class="btn-login">
                    <span class="material-symbols-outlined">login</span>
                    Entrar
                </button>
            </form>
        </div>

        <div class="login-footer">
            n.Call &copy; 2026 — Protótipo de validação
        </div>
    </div>

    <script>
        // Theme persistence
        (function() {
            const saved = localStorage.getItem('ncall_theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const cardEl = document.getElementById('login-card');

            if (user === 'enfermeira' && pass === 'enfermeira@2026!!') {
                sessionStorage.setItem('ncall_auth', 'true');
                sessionStorage.setItem('ncall_user', 'Enfermeira');
                window.location.href = 'app.html';
            } else {
                errorEl.classList.add('visible');
                cardEl.classList.add('shake');
                document.getElementById('username').classList.add('error');
                document.getElementById('password').classList.add('error');
                setTimeout(() => cardEl.classList.remove('shake'), 400);
                setTimeout(() => {
                    document.getElementById('username').classList.remove('error');
                    document.getElementById('password').classList.remove('error');
                }, 2000);
            }
            return false;
        }
        function togglePw() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('pw-icon');
            if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
            else { pw.type = 'password'; icon.textContent = 'visibility'; }
        }
        // If already logged in, go to app
        if (sessionStorage.getItem('ncall_auth') === 'true') {
            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
